server:
  port: 8089

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: united-marmoset-124667.upstash.io
      port: 6379
      password: xxxxxxxxxxxxxx
      ssl:
        enabled: true

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**

            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/order/**
              filters:
                - name: RequestRateLimiter
                  args:
                    key-resolver: "#{@userKeyResolver}"
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 10

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka